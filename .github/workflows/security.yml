name: Security Audit

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC

# Least privilege by default
permissions:
  contents: read

jobs:
  bandit:
    name: Security Audit / Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]>=1.7.9"

      # Report (never fails here)
      - name: Run Bandit (report)
        run: |
          bandit -r . \
            -c pyproject.toml \
            -f json \
            -o bandit-report.json \
            --exit-zero

      - name: Upload Bandit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

      # Gate: fail only on high/high
      - name: Fail on High severity & High confidence
        run: |
          bandit -r . \
            -c pyproject.toml \
            --severity-level high \
            --confidence-level high \
            -f txt

  pip-audit:
    name: Security Audit / pip-audit (CVE scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit (report)
        run: |
          pip-audit -r requirements.txt \
            --format json \
            --output pip-audit-report.json || true

      - name: Upload pip-audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

      - name: Fail on known vulnerabilities
        run: pip-audit -r requirements.txt

  semgrep:
    name: Security Audit / Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep \
            --config "p/python" \
            --config "p/secrets" \
            --config "p/owasp-top-ten" \
            --config "p/command-injection" \
            --config "p/insecure-transport" \
            --json \
            --output semgrep-report.json \
            --exclude "venv" \
            --exclude ".venv" \
            --exclude "FunPayCardinal" \
            . || true

      - name: Upload Semgrep Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json
          retention-days: 30

  trufflehog:
    name: Security Audit / TruffleHog (secrets scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # PUSH: scan only the pushed range (fix for base==head)
      - name: TruffleHog (push range)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@v3.95.9
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified --exclude-paths .trufflehogignore

      # PR: scan only PR range
      - name: TruffleHog (pull_request range)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@v3.95.9
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified --exclude-paths .trufflehogignore

      # SCHEDULE: full scan (не зависит от base/head)
      - name: TruffleHog (scheduled full scan)
        if: github.event_name == 'schedule'
        run: |
          docker run --rm \
            -v "$PWD:/repo" -w /repo \
            ghcr.io/trufflesecurity/trufflehog:3.95.9 \
            trufflehog git file://. \
              --only-verified \
              --fail \
              --exclude-paths .trufflehogignore

  check-secrets-not-committed:
    name: Security Audit / Check no .env committed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for .env files
        run: |
          if find . -name ".env" -not -path "./.git/*" | grep -q .; then
            echo "❌ ОШИБКА: .env файл найден в репозитории!"
            find . -name ".env" -not -path "./.git/*"
            exit 1
          fi
          echo "✅ .env файлы не найдены в репозитории"

      - name: Check for secret.key
        run: |
          if find . -name "secret.key" -not -path "./.git/*" | grep -q .; then
            echo "❌ ОШИБКА: secret.key найден в репозитории!"
            find . -name "secret.key" -not -path "./.git/*"
            exit 1
          fi
          echo "✅ secret.key не найден в репозитории"